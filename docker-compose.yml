version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: canopyml-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./reports:/app/reports
    environment:
      - APP_ENV=production
      - CORS_ORIGINS=["http://localhost", "http://localhost:80"]
    # If using NVIDIA GPU, uncomment the following:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: canopyml-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
