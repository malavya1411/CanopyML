name: CanopyML CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx

    - name: Run Backend Smoke Test
      run: |
        # In a real scenario, this would run pytest.
        # Here we do a dry-run import check to ensure dependencies are intact.
        python -c "from backend.config import settings; print('Backend config loaded successfully')"
        python -c "from ml.config import DATA_DIR; print('ML config loaded successfully')"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build

  docker-build:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Backend Image
      run: docker build -f Dockerfile.backend -t canopyml-backend:latest .
      
    - name: Build Frontend Image
      run: docker build -f Dockerfile.frontend -t canopyml-frontend:latest .
